<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TrendPulse — Social Content Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f6f3;--bg3:#eeecea;--tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#aaa;--br:rgba(0,0,0,.1);--br2:rgba(0,0,0,.2);--ac:#D85A30;--r:8px;--rl:12px;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:252px;min-width:252px;background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--br)}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--tx)}.logo span{color:var(--ac)}
.logo-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.sb-label{padding:14px 16px 6px;font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.9px}
.cl-list{flex:1;overflow-y:auto;padding:0 8px}
.cl-empty{padding:16px 10px;font-size:12px;color:var(--tx3);text-align:center;line-height:1.6}
.cl-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .12s}
.cl-item:hover{background:var(--bg3)}.cl-item.active{background:var(--bg3);border:1px solid var(--br2)}
.cl-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.cl-info{flex:1;min-width:0}
.cl-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-date{font-size:10px;color:var(--tx3);margin-top:1px}
.cl-del{opacity:0;font-size:17px;color:var(--tx3);background:none;border:none;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.cl-item:hover .cl-del{opacity:1}
.add-btn{margin:8px;padding:9px 12px;background:none;border:1px solid var(--br2);border-radius:var(--r);font-size:12px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:background .12s}
.add-btn:hover{background:var(--bg3)}
.add-form{padding:10px;border-top:1px solid var(--br);display:none}
.add-form input,.add-form textarea{width:100%;border:1px solid var(--br2);border-radius:var(--r);padding:8px 10px;font-size:12px;background:var(--bg);color:var(--tx);margin-bottom:6px;font-family:'DM Sans',sans-serif;resize:none;outline:none}
.add-form textarea{height:64px}
.add-form input:focus,.add-form textarea:focus{border-color:var(--ac)}
.fb{display:flex;gap:6px}
.btn-ok{flex:1;padding:8px;background:var(--ac);border:none;border-radius:var(--r);font-size:12px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.btn-no{flex:1;padding:8px;background:none;border:1px solid var(--br2);border-radius:var(--r);font-size:12px;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 24px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.tb-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-meta{font-size:12px;color:var(--tx2);margin-top:2px}
.go-btn{padding:10px 20px;background:var(--ac);border:none;border-radius:var(--r);font-size:13px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:7px;transition:opacity .15s}
.go-btn:hover{opacity:.85}.go-btn:disabled{opacity:.4;cursor:not-allowed}
.tabs{display:flex;border-bottom:1px solid var(--br);padding:0 24px;flex-shrink:0}
.tab{padding:12px 0;margin-right:24px;font-size:13px;font-weight:500;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;color:var(--tx2);font-family:'DM Sans',sans-serif;transition:color .12s}
.tab.on{color:var(--tx);border-bottom-color:var(--ac)}
.body{flex:1;overflow-y:auto;padding:22px 24px}
.pf-sec{margin-bottom:32px}
.pf-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.pf-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.pf-meta{background:#deedfb;color:#1155a3}.pf-ttk{background:#111;color:#fff}
.pf-ct{font-size:12px;color:var(--tx2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:16px;transition:border-color .15s}
.card:hover{border-color:var(--br2)}
.card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.3}
.eng{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.ev{background:#e5f2d8;color:#376010}.ea{background:#faecd8;color:#7a4a0a}.em{background:#eeecea;color:#555}
.card-desc{font-size:12px;color:var(--tx2);line-height:1.55;margin-bottom:10px}
.pill-section{margin-bottom:8px}
.pill-label{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.pills{display:flex;flex-wrap:wrap;gap:4px}
.pill-hash{font-size:11px;color:#1155a3;background:#deedfb;padding:3px 9px;border-radius:20px;font-weight:500}
.pill-audio{font-size:11px;color:#7a2d8a;background:#f5e8fb;padding:3px 9px;border-radius:20px;font-weight:500}
.pill-fmt{font-size:11px;color:#1a6b4a;background:#d8f0e8;padding:3px 9px;border-radius:20px;font-weight:500}
.idea-box{background:var(--bg2);border-left:2px solid var(--ac);border-radius:0 var(--r) var(--r) 0;padding:9px 11px;margin-bottom:10px}
.idea-lbl{font-size:10px;font-weight:500;color:var(--ac);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.idea-txt{font-size:12px;line-height:1.45}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:280px;gap:12px;text-align:center;color:var(--tx2)}
.c-icon{font-size:38px;opacity:.2}.c-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--tx)}
.c-sub{font-size:13px;max-width:320px;line-height:1.6}
.spin{width:32px;height:32px;border:2px solid var(--br);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.up-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.up-info{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4a8c1c;flex-shrink:0}
.cached-badge{font-size:11px;color:var(--tx3);background:var(--bg2);border:1px solid var(--br);padding:3px 10px;border-radius:20px}
.ref-btn{font-size:12px;color:var(--tx2);background:none;border:1px solid var(--br2);padding:5px 12px;border-radius:var(--r);cursor:pointer;font-family:'DM Sans',sans-serif}
.err{background:#fdf0ee;border:1px solid #f5c8c0;border-radius:var(--r);padding:14px 16px;font-size:13px;color:#922;line-height:1.6;margin-top:16px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div class="sb">
    <div class="sb-head">
      <div class="logo">trend<span>pulse</span></div>
      <div class="logo-sub">Social Content Intelligence</div>
    </div>
    <div class="sb-label">Clienti</div>
    <div class="cl-list" id="clList"></div>
    <button class="add-btn" id="addBtn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Aggiungi cliente
    </button>
    <div class="add-form" id="addForm">
      <input type="text" id="inName" placeholder="Nome cliente o brand..."/>
      <textarea id="inDesc" placeholder="Settore, prodotti, target, tono di voce..."></textarea>
      <div class="fb">
        <button class="btn-ok" id="saveBtn">Salva</button>
        <button class="btn-no" id="cancelBtn">Annulla</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="min-width:0">
        <div class="tb-title" id="tbTitle">Seleziona un cliente</div>
        <div class="tb-meta" id="tbMeta">Aggiungi un profilo cliente per iniziare</div>
      </div>
      <button class="go-btn" id="goBtn" disabled>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M9 9l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Analizza trend
      </button>
    </div>
    <div class="tabs" id="tabsBar" style="display:none">
      <button class="tab on" data-t="italy">🇮🇹 Italia</button>
      <button class="tab" data-t="international">🌍 Internazionale</button>
    </div>
    <div class="body" id="mainBody">
      <div class="center">
        <div class="c-icon">◎</div>
        <div class="c-title">Benvenuto in TrendPulse</div>
        <div class="c-sub">Aggiungi un cliente e clicca "Analizza trend" per scoprire hashtag del giorno, audio virali e format efficaci su Instagram e TikTok.</div>
      </div>
    </div>
  </div>
</div>

<script>
var LS_CL="tp_clients_v3", LS_TR="tp_trends_v3";
var COLS=["#D85A30","#185FA5","#1D9E75","#993556","#534AB7","#BA7517","#639922","#D4537E"];
var clients=[], sel=null, trendsCache={}, tab="italy", loading=false;

function ini(n){return(n||"?").trim().split(/\s+/).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2)||"?";}
function col(id){return COLS[parseInt(id,10)%COLS.length];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(iso){return new Date(iso).toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}

function saveClients(){try{localStorage.setItem(LS_CL,JSON.stringify(clients));}catch(e){}}
function loadClients(){try{clients=JSON.parse(localStorage.getItem(LS_CL)||"[]");}catch(e){clients=[];}}
function saveTrends(id,data){
  try{var all={};try{all=JSON.parse(localStorage.getItem(LS_TR)||"{}");}catch(e){}
  all[id]={data:data,date:new Date().toISOString()};
  localStorage.setItem(LS_TR,JSON.stringify(all));trendsCache[id]=all[id];}catch(e){}
}
function loadTrends(){try{trendsCache=JSON.parse(localStorage.getItem(LS_TR)||"{}");}catch(e){trendsCache={};}}
function getCached(id){return id?trendsCache[id]||null:null;}

function renderList(){
  var el=document.getElementById("clList");
  if(!clients.length){el.innerHTML='<div class="cl-empty">Nessun cliente.<br>Aggiungine uno.</div>';return;}
  el.innerHTML=clients.map(function(c){
    var cc=getCached(c.id);
    return'<div class="cl-item'+(sel&&sel.id===c.id?" active":"")+'" data-id="'+c.id+'">'
      +'<div class="cl-av" style="background:'+col(c.id)+'">'+ini(c.name)+'</div>'
      +'<div class="cl-info"><div class="cl-name">'+esc(c.name)+'</div>'
      +'<div class="cl-date">'+(cc?fmtDate(cc.date):"Nessuna ricerca")+'</div></div>'
      +'<button class="cl-del" data-del="'+c.id+'">×</button></div>';
  }).join("");
  el.querySelectorAll(".cl-item").forEach(function(item){
    item.addEventListener("click",function(e){
      if(e.target.dataset.del){delClient(e.target.dataset.del);return;}
      var f=clients.find(function(c){return c.id===item.dataset.id;});
      if(f)pickClient(f);
    });
  });
}

function pickClient(c){
  sel=c;renderList();
  document.getElementById("tbTitle").textContent=c.name;
  document.getElementById("goBtn").disabled=false;
  var cc=getCached(c.id);
  if(cc){
    document.getElementById("tbMeta").textContent="Ultima analisi: "+fmtDate(cc.date)+" alle "+fmtTime(cc.date);
    document.getElementById("tabsBar").style.display="flex";
    renderTrends(cc.data,true);
  } else {
    document.getElementById("tbMeta").textContent=c.desc?c.desc.slice(0,80)+(c.desc.length>80?"…":""):'Clicca "Analizza trend" per iniziare';
    document.getElementById("tabsBar").style.display="none";
    showEmpty();
  }
}

function delClient(id){
  clients=clients.filter(function(c){return c.id!==id;});saveClients();
  try{var all=JSON.parse(localStorage.getItem(LS_TR)||"{}");delete all[id];localStorage.setItem(LS_TR,JSON.stringify(all));delete trendsCache[id];}catch(e){}
  if(sel&&sel.id===id){sel=null;resetMain();}renderList();
}
function resetMain(){
  document.getElementById("tbTitle").textContent="Seleziona un cliente";
  document.getElementById("tbMeta").textContent="Aggiungi un profilo cliente per iniziare";
  document.getElementById("goBtn").disabled=true;
  document.getElementById("tabsBar").style.display="none";
  document.getElementById("mainBody").innerHTML='<div class="center"><div class="c-icon">◎</div><div class="c-title">Nessun cliente</div><div class="c-sub">Seleziona o aggiungi un cliente dalla sidebar.</div></div>';
}
function showEmpty(){
  document.getElementById("mainBody").innerHTML='<div class="center"><div class="c-icon">◈</div><div class="c-title">Pronto per '+esc(sel.name)+'</div><div class="c-sub">Clicca "Analizza trend" per trovare hashtag, audio virali TikTok e format efficaci.</div></div>';
}

document.getElementById("addBtn").addEventListener("click",function(){
  document.getElementById("addForm").style.display="block";
  document.getElementById("addBtn").style.display="none";
  document.getElementById("inName").focus();
});
document.getElementById("cancelBtn").addEventListener("click",function(){
  document.getElementById("addForm").style.display="none";
  document.getElementById("addBtn").style.display="flex";
  document.getElementById("inName").value="";document.getElementById("inDesc").value="";
});
function doAdd(){
  var name=document.getElementById("inName").value.trim();if(!name)return;
  var desc=document.getElementById("inDesc").value.trim();
  var c={id:Date.now().toString(),name:name,desc:desc};
  clients.push(c);saveClients();
  document.getElementById("inName").value="";document.getElementById("inDesc").value="";
  document.getElementById("addForm").style.display="none";
  document.getElementById("addBtn").style.display="flex";
  renderList();pickClient(c);
}
document.getElementById("saveBtn").addEventListener("click",doAdd);
document.getElementById("inName").addEventListener("keydown",function(e){if(e.key==="Enter")doAdd();});

document.getElementById("tabsBar").addEventListener("click",function(e){
  var btn=e.target.closest(".tab");if(!btn)return;
  tab=btn.dataset.t;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("on");});
  btn.classList.add("on");
  var cc=getCached(sel&&sel.id);if(cc)renderTrends(cc.data,true);
});

document.getElementById("goBtn").addEventListener("click",fetchTrends);

function fetchTrends(){
  if(!sel||loading)return;
  loading=true;
  document.getElementById("goBtn").disabled=true;
  document.getElementById("tabsBar").style.display="none";
  document.getElementById("mainBody").innerHTML='<div class="center"><div class="spin"></div><div class="c-title" style="margin-top:10px">Analisi in corso…</div><div class="c-sub">Sto cercando hashtag, audio virali e format per <strong>'+esc(sel.name)+'</strong></div></div>';

  var today=new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"});
  var nm=(sel.name||"").replace(/[\\"]/g," ").slice(0,80);
  var dc=(sel.desc||"settore generico").replace(/[\\"]/g," ").replace(/\n/g," ").slice(0,250);

  var prompt="Sei un social media strategist. Oggi: "+today+". "
    +"Cliente: "+nm+". Profilo: "+dc+". "
    +"Genera trend social per questo cliente, separando Italia e internazionale. "
    +"Rispondi SOLO con JSON valido (zero testo extra, zero backtick). "
    +"Schema (3 trend per sezione, 12 totali):\n"
    +'{"italy":{"meta":[{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"virale","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"alto","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"medio","idea":"I"}],"tiktok":[{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Canzone - Artista","Canzone2 - Artista2"],"format":"F","engagement":"virale","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Canzone - Artista"],"format":"F","engagement":"alto","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Canzone - Artista"],"format":"F","engagement":"medio","idea":"I"}]},"international":{"meta":[{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"virale","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"alto","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"format":"F","engagement":"medio","idea":"I"}],"tiktok":[{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Song - Artist"],"format":"F","engagement":"virale","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Song - Artist"],"format":"F","engagement":"alto","idea":"I"},{"title":"T","description":"D","hashtags":["#h1","#h2"],"trending_audio":["Song - Artist"],"format":"F","engagement":"medio","idea":"I"}]}}\n'
    +"Sostituisci: T=titolo trend reale, D=descrizione, #h=hashtag trending reale, F=formato (Reel/Carosello/Story/Video/Duetto/Stitch), I=idea concreta per il cliente, Canzone/Artist=audio TikTok virale reale. engagement: virale, alto, o medio.";

  fetch("/api/trends",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens:1800,
      messages:[{role:"user",content:prompt}]
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(d){throw new Error("[HTTP "+r.status+"] "+(d.error?d.error.message:JSON.stringify(d)));});
    return r.json();
  })
  .then(function(data){
    var raw="";
    (data.content||[]).forEach(function(b){if(b.type==="text")raw+=b.text;});
    raw=raw.replace(/```json/gi,"").replace(/```/g,"").trim();
    var s=raw.indexOf("{"),e=raw.lastIndexOf("}");
    if(s<0||e<0)throw new Error("Risposta non valida dal modello.");
    var parsed=JSON.parse(raw.slice(s,e+1));
    saveTrends(sel.id,parsed);
    document.getElementById("tabsBar").style.display="flex";
    document.getElementById("tbMeta").textContent="Ultima analisi: "+fmtDate(new Date().toISOString())+" alle "+fmtTime(new Date().toISOString());
    renderList();renderTrends(parsed,false);
  })
  .catch(function(err){
    document.getElementById("mainBody").innerHTML='<div class="err"><strong>Errore.</strong><br><br>'+esc(err.message)+'</div>';
  })
  .finally(function(){loading=false;document.getElementById("goBtn").disabled=false;});
}

function renderTrends(data,fromCache){
  if(!data)return;
  var market=data[tab];
  if(!market){document.getElementById("mainBody").innerHTML='<div class="err">Nessun dato per questa scheda.</div>';return;}
  var cc=getCached(sel&&sel.id);
  var html='<div class="up-bar"><div class="up-info"><span class="live-dot"></span>'
    +esc(cc?fmtDate(cc.date):"")+" alle "+esc(cc?fmtTime(cc.date):"")
    +(fromCache?' <span class="cached-badge">dalla cache</span>':'')+'</div>'
    +'<button class="ref-btn" onclick="fetchTrends()">↻ Aggiorna</button></div>';
  ["meta","tiktok"].forEach(function(pf){
    var items=market[pf]||[];if(!items.length)return;
    var lbl=pf==="meta"?"Meta — Instagram / Facebook":"TikTok";
    var bc=pf==="meta"?"pf-meta":"pf-ttk";
    html+='<div class="pf-sec"><div class="pf-head"><span class="pf-badge '+bc+'">'+lbl+'</span><span class="pf-ct">'+items.length+' trend</span></div><div class="grid">';
    items.forEach(function(t){
      var ec=t.engagement==="virale"?"ev":t.engagement==="alto"?"ea":"em";
      var hashP=(t.hashtags||[]).map(function(h){return'<span class="pill-hash">'+esc(h)+'</span>';}).join("");
      var audioP=(t.trending_audio||[]).map(function(a){return'<span class="pill-audio">♪ '+esc(a)+'</span>';}).join("");
      var fmtP=t.format?'<span class="pill-fmt">'+esc(t.format)+'</span>':"";
      html+='<div class="card"><div class="card-top"><div class="card-title">'+esc(t.title||"")+'</div><span class="eng '+ec+'">'+esc(t.engagement||"medio")+'</span></div>'
        +'<div class="card-desc">'+esc(t.description||"")+'</div>';
      if(hashP)html+='<div class="pill-section"><div class="pill-label">Hashtag trending</div><div class="pills">'+hashP+'</div></div>';
      if(audioP)html+='<div class="pill-section"><div class="pill-label">Audio virale TikTok</div><div class="pills">'+audioP+'</div></div>';
      if(fmtP)html+='<div class="pill-section"><div class="pill-label">Format consigliato</div><div class="pills">'+fmtP+'</div></div>';
      if(t.idea)html+='<div class="idea-box"><div class="idea-lbl">💡 Idea contenuto</div><div class="idea-txt">'+esc(t.idea)+'</div></div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById("mainBody").innerHTML=html;
}
